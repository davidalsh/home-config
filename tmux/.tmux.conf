# Prefix: use C-a instead of the default C-b. Press C-a twice to send a literal
# C-a to the program inside the pane (e.g. jump-to-line-start in shell/emacs).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim-style pane navigation: prefix + h/j/k/l (instead of arrow keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Mouse: drag pane borders to resize, click to focus, scroll to scrollback
set -g mouse on

# Open new splits / windows in the SAME folder as the current pane.
# (By default tmux uses the dir where the server started.)
bind '"' split-window -v -c "#{pane_current_path}"   # prefix + "  → horizontal split
bind % split-window -h -c "#{pane_current_path}"      # prefix + %  → vertical split
bind c new-window -c "#{pane_current_path}"           # prefix + c  → new window

# Vim-style pane resizing: prefix + H/J/K/L (repeatable — hold prefix once, keep tapping)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Start window (and pane) numbering at 1 so Cmd+1 = first window
set -g base-index 1
setw -g pane-base-index 1
# Keep window numbers contiguous after closing one (so number keys stay aligned)
set -g renumber-windows on

# ── Status bar: clean flat tabs ──────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

# Overall bar background/foreground
set -g status-style "bg=colour235,fg=colour245"

# Left: session name in an accent block
set -g status-left-length 30
set -g status-left "#[bg=colour173,fg=colour235,bold] #S #[bg=colour235,fg=colour239]"

# Right: date + time (time highlighted)
set -g status-right-length 40
set -g status-right "#[fg=colour245] %a %d %b #[bg=colour239,fg=colour255] %H:%M "

# Inactive tabs: dim grey, no gap between them
set -g window-status-separator ""
set -g window-status-format "#[fg=colour245] #I #W "

# Active tab: solid accent block, bold
set -g window-status-current-format "#[bg=colour39,fg=colour235,bold] #I #W "

# Windows with new output get a subtle marker
setw -g monitor-activity on
set -g window-status-activity-style "fg=colour203,bold"

# Pane borders: the active pane's border is highlighted in a calm teal — a hue
# that isn't used elsewhere in the bar (orange session block, blue active tab,
# red activity), so it reads as its own "focused pane" signal without clashing.
# (Note: a highlighted border is shared with the neighbour pane, so the colour
# runs along the full shared edge; the junction glyph is one character and can
# only be a single colour — tmux can't avoid that. See tmux#2540.)
set -g pane-border-lines single
set -g pane-border-indicators colour
set -g pane-border-style "fg=colour236"
set -g pane-active-border-style "fg=colour73"
